<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BandUp — Daily Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body data-page="practice">

<nav class="nav">
  <div class="nav-brand">Band<span>Up</span></div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="btn btn-ghost btn-sm" onclick="showScreen('dashboard')">Dashboard</button>
    <button class="btn btn-ghost btn-sm" onclick="showScreen('studyplan')">Study Plan</button>
  </div>
</nav>

<main class="main">
  <div class="screen active" id="screen-practice">
    <div class="three-col">
      <div>
        <div class="card card-pad mb-16">
          <div class="flex items-center gap-12 mb-16">
            <div class="avatar" id="practiceAvatar">TR</div>
            <div>
              <p class="font-medium" id="practiceUserName" style="font-size:14px">-</p>
              <p class="caption">Band target: <span id="practiceTarget">-</span></p>
            </div>
          </div>
          <div class="flex justify-between mb-6">
            <p class="caption">Today's progress</p>
            <p class="caption font-medium" id="practiceProgressText">0 / 0 tasks</p>
          </div>
          <div class="progress-bar mb-4"><div class="progress-fill teal" id="practiceProgressFill" style="width:0%"></div></div>
          <p class="caption color-hint" id="practiceRemainingText">No task loaded</p>
          <p class="caption mt-10" id="practiceStatus"></p>
        </div>

        <div class="card card-pad">
          <p class="label mb-12">Quick actions</p>
          <div class="flex gap-8" style="flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" onclick="loadDailyPractice()">Refresh tasks</button>
            <button class="btn btn-outline btn-sm" onclick="showScreen('dashboard')">View progress</button>
          </div>
        </div>
      </div>

      <div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
          <div>
            <p class="label mb-2">Today</p>
            <h2 class="display-sm">Daily Tasks</h2>
          </div>
          <span class="badge badge-amber">MVP Flow</span>
        </div>

        <div class="card" style="overflow:hidden" id="practiceTaskList"></div>
      </div>

      <div>
        <p class="label mb-12">Recent feedback</p>
        <div class="card" style="overflow:hidden" id="practiceRecentFeedback"></div>
      </div>
    </div>
  </div>
</main>

<script src="./index.js"></script>
</body>
</html>
