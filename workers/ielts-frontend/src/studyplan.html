<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BandUp — Study Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body data-page="studyplan">

<nav class="nav">
  <div class="nav-brand">Band<span>Up</span></div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="btn btn-ghost btn-sm" onclick="showScreen('dashboard')">Dashboard</button>
    <button class="btn btn-primary btn-sm" onclick="showScreen('practice')">Daily Practice</button>
  </div>
</nav>

<main class="main">
  <div class="screen active" id="screen-studyplan">
    <div class="two-col">
      <div>
        <p class="label mb-8">Your personalised plan</p>
        <h2 class="display-sm mb-4">Study Plan</h2>
        <p class="color-secondary mb-14" id="studyPlanSummary" style="font-size:14px">Generate your plan based on onboarding and placement data.</p>
        <p class="caption mb-12" id="studyPlanStatus"></p>

        <div class="flex gap-8 mb-20">
          <button class="btn btn-primary btn-sm" id="studyPlanGenerateBtn" onclick="generateStudyPlan()">Generate Plan</button>
          <button class="btn btn-outline btn-sm" onclick="loadStudyPlan()">Refresh</button>
        </div>

        <div class="card card-pad mb-16">
          <div class="flex justify-between items-center mb-4">
            <p class="font-medium" style="font-size:14px">Baseline score</p>
            <span class="badge badge-outline">Placement Test</span>
          </div>
          <div class="grid-4" style="grid-template-columns:1fr 1fr; margin-top:12px">
            <div class="metric-card">
              <p class="metric-sub">Current band</p>
              <p class="metric-value" id="studyPlanBaselineVal">-</p>
            </div>
            <div class="metric-card">
              <p class="metric-sub">Target band</p>
              <p class="metric-value" id="studyPlanTargetVal" style="color:var(--amber)">-</p>
            </div>
          </div>
        </div>

        <div class="card card-pad mb-16">
          <p class="font-medium mb-12" style="font-size:14px">Priority skills</p>
          <div id="studyPlanPriorityList"></div>
        </div>

        <div class="card card-pad" style="border-color:var(--amber); background:var(--amber-pale)">
          <p class="font-medium mb-6" style="font-size:13px; color:var(--amber)">AI Insight</p>
          <p class="caption" id="studyPlanInsight" style="color:var(--text-primary)">Generate your plan to see the insight.</p>
        </div>
      </div>

      <div>
        <div class="card" style="overflow:hidden">
          <div style="padding:20px 24px; border-bottom:0.5px solid var(--border); display:flex; justify-content:space-between; align-items:center">
            <h3 id="studyPlanTitle" style="font-size:16px; font-weight:500">Week 1 — Foundation</h3>
            <span class="badge badge-teal">Active</span>
          </div>
          <div style="padding:8px 24px" id="studyPlanWeekList"></div>
          <div style="padding:16px 24px; border-top:0.5px solid var(--border); display:flex; justify-content:space-between; align-items:center">
            <p class="caption" id="studyPlanFooter">Estimated: 60 min/day</p>
            <button class="btn btn-primary btn-sm" id="studyPlanStartBtn" onclick="showScreen('practice')">Start today →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="./index.js"></script>
</body>
</html>
